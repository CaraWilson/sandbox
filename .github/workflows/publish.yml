name: Quarto Publish

on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # This force-enables Node 24 for all steps in this job
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v6 # <--- Updated from v4 to v6

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2 # v2 is already updated to Node 24

      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@v2 # v2 is already updated to Node 24
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
